<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .game-container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            min-width: 150px;
        }
        
        .stat-label {
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        canvas {
            border: 3px solid #4a4a6a;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .theme-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }
        
        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .theme-btn.active {
            border-color: white;
            transform: scale(1.2);
        }
        
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 5px;
            margin-top: 20px;
        }
        
        .mobile-btn {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
        
        .mobile-btn:active {
            background: rgba(255,255,255,0.4);
        }
        
        .mobile-btn.up { grid-column: 2; grid-row: 1; }
        .mobile-btn.left { grid-column: 1; grid-row: 2; }
        .mobile-btn.down { grid-column: 2; grid-row: 2; }
        .mobile-btn.right { grid-column: 3; grid-row: 2; }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            font-size: 3em;
            color: #ff4757;
            margin-bottom: 20px;
        }
        
        .new-record {
            color: #ffd700;
            font-size: 1.5em;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }
            
            canvas {
                max-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最高分</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        
        <div class="controls">
            <div class="btn-group">
                <button class="btn-primary" id="startBtn" onclick="toggleGame()">开始游戏</button>
                <button class="btn-secondary" onclick="changeTheme()">🎨 换皮肤</button>
                <button class="btn-secondary" onclick="toggleSound()">🔊 <span id="soundStatus">音效开</span></button>
            </div>
            
            <div class="theme-selector" id="themeSelector"></div>
        </div>
        
        <div class="mobile-controls">
            <button class="mobile-btn up" onclick="handleMobileInput('up')">⬆️</button>
            <button class="mobile-btn left" onclick="handleMobileInput('left')">⬅️</button>
            <button class="mobile-btn down" onclick="handleMobileInput('down')">⬇️</button>
            <button class="mobile-btn right" onclick="handleMobileInput('right')">➡️</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <div class="new-record" id="newRecord" style="display:none">🏆 新纪录！🏆</div>
        <p style="font-size: 1.5em; margin-bottom: 20px;">最终得分：<span id="finalScore">0</span></p>
        <button class="btn-primary" onclick="restartGame()">再来一局</button>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CELL_SIZE = 20;
        const GRID_W = canvas.width / CELL_SIZE;
        const GRID_H = canvas.height / CELL_SIZE;
        
        // 🎨 主题配置
        const THEMES = {
            classic: { name: '经典绿', snake: '#00ff00', body: '#00c800', food: '#ff0000', bg: '#000000' },
            blue: { name: '蓝色风暴', snake: '#0096ff', body: '#0064c8', food: '#ff6400', bg: '#0a0a1e' },
            purple: { name: '紫色幻影', snake: '#b432ff', body: '#781ec8', food: '#ff3296', bg: '#14051e' },
            golden: { name: '黄金传说', snake: '#ffdc00', body: '#c8aa00', food: '#ff3232', bg: '#1e1405' },
            matrix: { name: '黑客帝国', snake: '#00ff64', body: '#00b432', food: '#ffffff', bg: '#000a00' },
            dark: { name: '暗黑模式', snake: '#969696', body: '#646464', food: '#ff5050', bg: '#0f0f0f' }
        };
        
        let currentTheme = 'classic';
        let soundEnabled = true;
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let highScores = JSON.parse(localStorage.getItem('snakeHighScores')) || {};
        
        // 音效上下文
        let audioCtx = null;
        
        // 游戏状态
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let gameLoop = null;
        
        // 初始化主题选择器
        function initThemeSelector() {
            const container = document.getElementById('themeSelector');
            Object.entries(THEMES).forEach(([key, theme]) => {
                const btn = document.createElement('button');
                btn.className = 'theme-btn' + (key === currentTheme ? ' active' : '');
                btn.style.background = theme.snake;
                btn.title = theme.name;
                btn.onclick = () => setTheme(key);
                container.appendChild(btn);
            });
        }
        
        // 设置主题
        function setTheme(theme) {
            currentTheme = theme;
            document.querySelectorAll('.theme-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', Object.keys(THEMES)[idx] === theme);
            });
            if (!gameRunning) draw();
            localStorage.setItem('snakeTheme', theme);
        }
        
        // 切换主题
        function changeTheme() {
            const themes = Object.keys(THEMES);
            const idx = themes.indexOf(currentTheme);
            setTheme(themes[(idx + 1) % themes.length]);
        }
        
        // 切换音效
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundStatus').textContent = soundEnabled ? '音效开' : '音效关';
            localStorage.setItem('snakeSound', soundEnabled);
        }
        
        // 播放音效
        function playSound(type) {
            if (!soundEnabled) return;
            
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'eat') {
                oscillator.frequency.value = 440;
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'gameover') {
                oscillator.frequency.value = 150;
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }
        
        // 初始化游戏
        function initGame() {
            snake = [
                { x: Math.floor(GRID_W / 2), y: Math.floor(GRID_H / 2) },
                { x: Math.floor(GRID_W / 2) - 1, y: Math.floor(GRID_H / 2) },
                { x: Math.floor(GRID_W / 2) - 2, y: Math.floor(GRID_H / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            updateScore();
            spawnFood();
        }
        
        // 生成食物
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_W),
                    y: Math.floor(Math.random() * GRID_H)
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }
        
        // 更新游戏状态
        function update() {
            if (gamePaused) return;
            
            direction = { ...nextDirection };
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            // 检查碰撞
            if (head.x < 0 || head.x >= GRID_W || head.y < 0 || head.y >= GRID_H ||
                snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 检查吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                playSound('eat');
                spawnFood();
            } else {
                snake.pop();
            }
        }
        
        // 绘制游戏
        function draw() {
            const theme = THEMES[currentTheme];
            
            // 清空画布
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = '#282828';
            for (let x = 0; x <= canvas.width; x += CELL_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += CELL_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制蛇
            snake.forEach((seg, idx) => {
                ctx.fillStyle = idx === 0 ? theme.snake : theme.body;
                ctx.fillRect(seg.x * CELL_SIZE, seg.y * CELL_SIZE, CELL_SIZE - 2, CELL_SIZE - 2);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(seg.x * CELL_SIZE, seg.y * CELL_SIZE, CELL_SIZE - 2, CELL_SIZE - 2);
            });
            
            // 绘制食物
            ctx.fillStyle = theme.food;
            ctx.fillRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE - 2, CELL_SIZE - 2);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE - 2, CELL_SIZE - 2);
        }
        
        // 更新分数显示
        function updateScore() {
            document.getElementById('score').textContent = score;
            const themeHighScore = highScores[currentTheme] || 0;
            document.getElementById('highScore').textContent = themeHighScore;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            playSound('gameover');
            
            // 更新最高分
            const themeHighScore = highScores[currentTheme] || 0;
            const isNewRecord = score > themeHighScore;
            if (isNewRecord) {
                highScores[currentTheme] = score;
                localStorage.setItem('snakeHighScores', JSON.stringify(highScores));
            }
            
            // 显示游戏结束界面
            document.getElementById('finalScore').textContent = score;
            document.getElementById('newRecord').style.display = isNewRecord ? 'block' : 'none';
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            initGame();
            gameRunning = true;
            gamePaused = false;
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 100);
        }
        
        // 切换游戏状态
        function toggleGame() {
            if (gameRunning) {
                gamePaused = !gamePaused;
                document.getElementById('startBtn').textContent = gamePaused ? '继续' : '暂停';
            } else {
                restartGame();
                document.getElementById('startBtn').textContent = '暂停';
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
                case 'p':
                case 'P':
                    toggleGame();
                    break;
                case 't':
                case 'T':
                    changeTheme();
                    break;
                case 'm':
                case 'M':
                    toggleSound();
                    break;
            }
        });
        
        // 移动端控制
        function handleMobileInput(dir) {
            if (!gameRunning) return;
            
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        // 初始化
        function init() {
            // 加载保存的设置
            const savedTheme = localStorage.getItem('snakeTheme');
            if (savedTheme && THEMES[savedTheme]) {
                setTheme(savedTheme);
            }
            
            const savedSound = localStorage.getItem('snakeSound');
            if (savedSound !== null) {
                soundEnabled = savedSound === 'true';
                document.getElementById('soundStatus').textContent = soundEnabled ? '音效开' : '音效关';
            }
            
            initThemeSelector();
            initGame();
            draw();
            
            // 加载最高分
            updateScore();
        }
        
        init();
    </script>
</body>
</html>
